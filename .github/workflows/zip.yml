name: 打包并上传扩展 ZIP

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.ref_name }}
  ZIP_NAME: linux-do-side-view-${{ github.ref_name }}.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 更新版本号并提交
        run: |
          # 提取纯数字版本号，移除可能包含的 'v' 前缀 (如 v1.2.0 -> 1.2.0)
          VERSION="${TAG_NAME#v}"
          echo "更新 manifest.json 版本号为: $VERSION"
          
          # 使用 jq 更新 manifest.json
          jq ".version = \"$VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json
          
          # 配置 git 提交信息
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          
          # 检查是否有文件变更
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to $VERSION [skip ci]"
            
            # 查找当前 tag 所在的远程分支
            BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | head -n 1 | sed 's/^[ \t]*origin\///')
            
            if [ -n "$BRANCH" ]; then
              echo "将更新推送到分支: $BRANCH"
              git push origin "HEAD:$BRANCH"
            else
              echo "未找到包含该 commit 的远程分支，跳过推送。"
            fi
          else
            echo "版本号已经是 $VERSION，无需提交更改。"
          fi

      - name: 创建 ZIP 压缩包
        run: |
          zip -r "${ZIP_NAME}" . -x "README.md" "readme.md" "assets/*" ".*" ".*/*"

      - name: 上传 ZIP 包为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: 创建或更新 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 确保获取的是真实的 previous tag，不受前面 commit 操作移动 HEAD 的影响
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${TAG_NAME}^ 2>/dev/null || echo "")
          
          # 生成更新日志 (changelog)
          LOG_ARGS=(
            --pretty=format:"* %s (%h)"
            --invert-grep
            --grep="^chore: bump version to .* \\[skip ci\\]$"
          )

          if [ -z "$PREVIOUS_TAG" ]; then
            git log "${LOG_ARGS[@]}" > changelog.txt
          else
            git log "${LOG_ARGS[@]}" ${PREVIOUS_TAG}..HEAD > changelog.txt
          fi

          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            # 更新已有 Release 的说明和附件
            gh release edit "${TAG_NAME}" --notes-file changelog.txt
            gh release upload "${TAG_NAME}" "${ZIP_NAME}" --clobber
          else
            # 创建新 Release 并附带更新日志
            gh release create "${TAG_NAME}" "${ZIP_NAME}" --title "${TAG_NAME}" --notes-file changelog.txt
          fi
