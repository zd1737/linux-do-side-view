name: 打包并上传扩展 ZIP

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.ref_name }}
  ZIP_NAME: linux-do-side-view-${{ github.ref_name }}.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 准备扩展文件
        run: |
          mkdir -p release-package
          cp manifest.json content.js page-bridge.js styles.css release-package/

      - name: 创建 ZIP 压缩包
        run: |
          cd release-package
          zip -r "../${ZIP_NAME}" .

      - name: 上传 ZIP 包为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: 创建或更新 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取上一个 tag，如果找不到则为空
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # 生成更新日志 (changelog)
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s (%h)" > changelog.txt
          else
            git log --pretty=format:"* %s (%h)" ${PREVIOUS_TAG}..HEAD > changelog.txt
          fi

          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            # 更新已有 Release 的说明和附件
            gh release edit "${TAG_NAME}" --notes-file changelog.txt
            gh release upload "${TAG_NAME}" "${ZIP_NAME}" --clobber
          else
            # 创建新 Release 并附带更新日志
            gh release create "${TAG_NAME}" "${ZIP_NAME}" --title "${TAG_NAME}" --notes-file changelog.txt
          fi
