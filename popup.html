<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Linux.do SideView Settings</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --surface-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --slider-track: #cbd5e1;
      --slider-thumb: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0f172a;
        --surface-color: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #334155;
        --primary-color: #60a5fa;
        --primary-hover: #93c5fd;
        --slider-track: #475569;
        --slider-thumb: #e2e8f0;
      }
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--surface-color);
    }

    .header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      color: var(--primary-color);
    }

    .content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }

    .setting-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-color);
      background: var(--surface-color);
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: center;
    }

    .slider-container {
      position: relative;
      padding: 4px 0;
    }

    .mode-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mode-option {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--surface-color);
      color: var(--text-muted);
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .mode-option:hover {
      border-color: color-mix(in srgb, var(--border-color) 45%, var(--primary-color));
      color: var(--text-main);
    }

    .mode-option.is-active {
      background: color-mix(in srgb, var(--surface-color) 55%, var(--primary-color));
      border-color: var(--primary-color);
      color: var(--primary-hover);
      box-shadow: var(--shadow-sm);
    }

    .slider-input {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: var(--slider-track);
      border-radius: 6px;
      outline: none;
      transition: background 0.2s ease;
    }

    .slider-input:hover {
      background: color-mix(in srgb, var(--slider-track) 80%, var(--primary-color));
    }

    .slider-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--slider-thumb);
      border: 2px solid var(--primary-color);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.1s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .slider-input::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-hover);
    }
    
    .slider-input:active::-webkit-slider-thumb {
      transform: scale(0.95);
      background: var(--primary-color);
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      text-align: center;
      background: var(--surface-color);
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <svg class="header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="15" y1="3" x2="15" y2="21"></line>
      </svg>
      SideView 设置
    </h1>
  </div>

  <div class="content">
    <div class="setting-group">
      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">弱化方案</span>
        </div>
        <div class="mode-options" role="group" aria-label="弱化方案">
          <button type="button" class="mode-option is-active" data-dim-mode="text">文字融入</button>
          <button type="button" class="mode-option" data-dim-mode="mask">遮罩</button>
        </div>
      </div>

      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">弱化强度</span>
          <span class="setting-value" id="dim-percent-display">0%</span>
        </div>
        <div class="slider-container">
          <input type="range" id="dim-slider" min="0" max="100" value="0" class="slider-input" title="调节弱化强度">
        </div>
      </div>
      
      <div class="setting-item">
        <div class="setting-header">
          <span class="setting-label">过渡时间</span>
          <span class="setting-value" id="dim-duration-display">2.0s</span>
        </div>
        <div class="slider-container">
          <input type="range" id="dim-duration-slider" min="0" max="50" value="20" class="slider-input" title="调节虚化动画速度">
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/zd1737/linux-do-side-view" target="_blank" rel="noopener noreferrer">Linux.do SideView</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
